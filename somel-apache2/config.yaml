---
name: Apache2
version: 1.0.3
slug: somel-apache2
description: apache avec PHP 8.5
url: https://github.com/somel-web/homeassistant-apps/tree/main/somel-apache2
arch:
  - amd64
  - aarch64
map:
  - ssl:rw
  - media:rw
  - share:rw
  - config:rw
ingress: true
ingress_port: 80
init: false
panel_icon: mdi:web-box
options:
  document_root: /share/htdocs
  php_ini: default
  default_conf: default
  default_ssl_conf: default
  website_name: "web.local"
  ssl: false
  certfile: fullchain.pem
  keyfile: privkey.pem
  log_level: "info"
  init_commands: []
schema:
  document_root: str
  php_ini: str
  default_conf: str
  default_ssl_conf: str
  website_name: str
  username: str?
  password: password?
  ssl: bool
  certfile: str
  keyfile: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  init_commands:
    - str?
ports:
  80/tcp: 80
  443/tcp: 8324
ports_description:
  80/tcp: Web interface HTTP
  443/tcp: Web interface SSL
hassio_api: true
hassio_role: manager
